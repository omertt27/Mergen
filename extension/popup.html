<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mergen</title>
  
  <!-- Geist + Geist Mono -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" rel="stylesheet" />

  <style>
    /* ─── TOKENS (Monolith Refined) ────────────────────────────────────────── */
    :root {
      --bg: #050505; /* Softened */
      --surface: #0a0a0a;
      --surface2: #141414;
      --border: #1a1a1a;
      --border-bright: #ffffff;
      --text: #f0f0f0; /* Softened */
      --text-muted: #808080;
      --text-dim: #404040;
      --accent: #a5f3fc; /* Tech Cyan */
      --accent-dim: #0891b2;
      --font: 'Geist', sans-serif;
      --mono: 'Geist Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }
    .logo-text {
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-text::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .status-pill {
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border: 1px solid var(--border-bright);
      color: var(--text);
    }
    .status-pill.disconnected { border-color: var(--text-dim); color: var(--text-dim); }

    /* ── Info Bar ── */
    .info-bar {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #080808;
    }

    /* ── Plan & Credits ── */
    .plan-banner {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plan-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
    }
    .credit-count {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── Stats Grid ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      padding: 1.5rem 0.5rem;
      text-align: center;
      border-right: 1px solid var(--border);
      transition: background 0.2s;
    }
    .stat:hover { background: #0c0c0c; }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-size: 1.25rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.25rem;
      color: var(--text);
    }
    .stat-lbl {
      font-family: var(--mono);
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }

    /* ── Signals ── */
    #signals-wrap { border-bottom: 1px solid var(--border); display: none; }
    #signals-wrap.has-signals { display: block; }
    .signals-header {
      padding: 0.5rem 1rem;
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      background: var(--surface);
    }
    .signal {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      transition: background 0.2s;
    }
    .signal:hover { background: #0c0c0c; }
    .signal-msg { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--accent); }
    .signal-cta {
      display: inline-block;
      margin-top: 0.25rem;
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
    }
    .signal-cta:hover { background: var(--accent); color: var(--bg); }

    /* ── Actions ── */
    .actions {
      padding: 1rem;
      display: flex;
      gap: 0.75rem;
    }
    .btn {
      flex: 1;
      padding: 0.7rem;
      font-family: var(--font);
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { border-color: var(--text-dim); color: var(--text-dim); cursor: not-allowed; }
    .btn-gear { flex: 0; padding: 0.7rem 0.9rem; }

    /* ── Settings ── */
    .settings-panel {
      display: none;
      padding: 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .settings-panel.open { display: block; }
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .settings-row:last-child { margin-bottom: 0; }
    .settings-lbl {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .port-input {
      width: 65px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 3px 6px;
      outline: none;
    }
    .port-input:focus { border-color: var(--accent); }

    /* ── PII Preview panel ── */
    .pii-panel {
      display: none;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .pii-panel.open { display: block; }
    .pii-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .pii-entity {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.65rem;
    }
    .pii-entity:last-child { border-bottom: none; }
    .pii-type {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 0.6rem;
      width: 80px;
      flex-shrink: 0;
    }
    .pii-value {
      flex: 1;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 6px;
    }
    .pii-toggle {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.55rem;
      color: var(--text-dim);
    }
    .pii-count {
      display: inline-block;
      background: rgba(239,68,68,.15);
      color: #ef4444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.55rem;
      font-family: var(--mono);
      cursor: pointer;
    }
    .pii-count:empty { display: none; }

    /* ── Footer ── */
    footer {
      padding: 1.25rem 1rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }
    footer a { color: var(--text-muted); transition: color 0.2s; }
    footer a:hover { color: var(--accent); }

    /* ── Utils ── */
    #muted-banner {
      padding: 0.5rem 1rem;
      background: #1a1a00; /* Subtle warning yellow-ish dark */
      color: #fbbf24;
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      text-align: center;
      display: none;
      border-bottom: 1px solid #453000;
    }
    #no-cs-banner {
      padding: 0.8rem 1rem;
      background: var(--accent);
      color: var(--bg);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.65rem;
      text-align: center;
      width: 100%;
      border: none;
      display: none;
      cursor: pointer;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.9); }
      70% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0.5; transform: scale(0.9); }
    }
  </style>
</head>
<body>

  <button id="no-cs-banner">CAPTURING DISABLED // RELOAD TAB</button>
  <div id="muted-banner">RECORDING PAUSED ON THIS TAB</div>

  <div class="header">
    <div class="logo-text">Mergen</div>
    <div class="status-pill checking" id="status-pill">
      <span id="status-text">INIT</span>
    </div>
  </div>

  <div class="info-bar">
    <span id="server-url">127.0.0.1:3000</span> // <span id="mcp-sub">MCP: ...</span>
  </div>

  <div class="plan-banner">
    <div class="plan-label" id="plan-badge">Standard</div>
    <div class="credit-count" id="credit-count">0/500</div>
  </div>

  <div id="signals-wrap">
    <div class="signals-header">Live Findings</div>
    <div id="signals-list"></div>
  </div>

  <div class="stats" id="stats-grid">
    <div class="stat">
      <div class="stat-val" id="stat-errors">0</div>
      <div class="stat-lbl">Err</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-warns">0</div>
      <div class="stat-lbl">Wrn</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-net">0</div>
      <div class="stat-lbl">Net</div>
    </div>
  </div>

  <div class="pii-panel" id="pii-panel">
    <div class="pii-header">
      <span>🛡 PII Shield — Detected Entities</span>
      <span id="pii-close" style="cursor:pointer;color:var(--text-dim)">✕</span>
    </div>
    <div id="pii-list">
      <div style="font-size:0.65rem;color:var(--text-dim)">No sensitive patterns detected in recent events.</div>
    </div>
  </div>

  <div class="settings-panel" id="port-row">
    <div class="settings-row">
      <span class="settings-lbl">Nexus Port</span>
      <input class="port-input" type="number" id="port-input" value="3000" />
    </div>
    <div class="settings-row">
      <span class="settings-lbl">Active Capture</span>
      <input type="checkbox" id="mute-toggle" checked />
    </div>
    <button class="btn" id="port-save" style="margin-top:0.5rem; border-color:var(--accent); color:var(--accent);">Save Cluster Config</button>
  </div>

  <div class="actions">
    <button class="btn" id="btn-clear" disabled>Clear Buffer</button>
    <button class="btn btn-gear" id="btn-pii" title="PII Shield — view detected sensitive entities">🛡 <span id="pii-badge" class="pii-count"></span></button>
    <button class="btn btn-gear" id="btn-gear">M</button>
  </div>

  <footer>
    <a href="#" id="welcome-link">Docs</a> // <a href="#" id="pricing-link">License</a> // v1.0.0
  </footer>

  <script src="src/popup.js"></script>
</body>
</html>
