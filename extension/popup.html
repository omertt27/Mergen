<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mergen</title>
  
  <!-- Geist + Geist Mono -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" rel="stylesheet" />

  <style>
    /* ─── TOKENS (Monolith B&W) ────────────────────────────────────────────── */
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface2: #1a1a1a;
      --border: #262626;
      --border-bright: #ffffff;
      --text: #ffffff;
      --text-muted: #808080;
      --text-dim: #404040;
      --accent: #ffffff;
      --red: #ffffff; /* We keep it B&W but maybe use weight/borders for errors */
      --green: #ffffff;
      --yellow: #ffffff;
      --font: 'Geist', sans-serif;
      --mono: 'Geist Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo-text {
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.8rem;
    }
    .status-pill {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border: 1px solid var(--border-bright);
    }
    .status-pill.disconnected { border-color: var(--text-dim); color: var(--text-dim); }

    /* ── Server Info ── */
    .info-bar {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Plan & Credits ── */
    .plan-banner {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plan-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    .credit-count {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* ── Stats Grid ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      padding: 1.25rem 0.5rem;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-size: 1.25rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-lbl {
      font-family: var(--mono);
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-muted);
    }

    /* ── Signals ── */
    #signals-wrap { border-bottom: 1px solid var(--border); display: none; }
    #signals-wrap.has-signals { display: block; }
    .signals-header {
      padding: 0.5rem 1rem;
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      background: var(--surface);
    }
    .signal {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
    }
    .signal-msg { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem; }
    .signal-cta {
      display: inline-block;
      margin-top: 0.25rem;
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid var(--border-bright);
      cursor: pointer;
    }

    /* ── Actions ── */
    .actions {
      padding: 1rem;
      display: flex;
      gap: 0.75rem;
    }
    .btn {
      flex: 1;
      padding: 0.6rem;
      font-family: var(--font);
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-bright);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--text); color: var(--bg); }
    .btn:disabled { border-color: var(--text-dim); color: var(--text-dim); cursor: not-allowed; }
    .btn-gear { flex: 0; padding: 0.6rem 0.8rem; }

    /* ── Settings ── */
    .settings-panel {
      display: none;
      padding: 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .settings-panel.open { display: block; }
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .settings-row:last-child { margin-bottom: 0; }
    .settings-lbl {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .port-input {
      width: 60px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 2px 4px;
      outline: none;
    }
    .port-input:focus { border-color: var(--border-bright); }

    /* ── Footer ── */
    footer {
      padding: 1rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }
    footer a { color: var(--text-muted); }

    /* ── Utils ── */
    #muted-banner {
      padding: 0.5rem 1rem;
      background: var(--surface2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      text-align: center;
      display: none;
    }
    #no-cs-banner {
      padding: 0.75rem 1rem;
      background: var(--text);
      color: var(--bg);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.6rem;
      text-align: center;
      width: 100%;
      border: none;
      display: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button id="no-cs-banner">CAPTURING DISABLED // RELOAD TAB</button>
  <div id="muted-banner">RECORDING PAUSED</div>

  <div class="header">
    <div class="logo-text">Mergen</div>
    <div class="status-pill checking" id="status-pill">
      <span id="status-text">INIT</span>
    </div>
  </div>

  <div class="info-bar">
    <span id="server-url">127.0.0.1:3000</span> // <span id="mcp-sub">MCP: ...</span>
  </div>

  <div class="plan-banner">
    <div class="plan-label" id="plan-badge">Standard</div>
    <div class="credit-count" id="credit-count">0/500</div>
  </div>

  <div id="signals-wrap">
    <div class="signals-header">Live Findings</div>
    <div id="signals-list"></div>
  </div>

  <div class="stats" id="stats-grid">
    <div class="stat">
      <div class="stat-val" id="stat-errors">0</div>
      <div class="stat-lbl">Err</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-warns">0</div>
      <div class="stat-lbl">Wrn</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-net">0</div>
      <div class="stat-lbl">Net</div>
    </div>
  </div>

  <div class="settings-panel" id="port-row">
    <div class="settings-row">
      <span class="settings-lbl">Port</span>
      <input class="port-input" type="number" id="port-input" value="3000" />
    </div>
    <div class="settings-row">
      <span class="settings-lbl">Capture</span>
      <input type="checkbox" id="mute-toggle" checked />
    </div>
    <button class="btn" id="port-save" style="margin-top:0.5rem">Save Configuration</button>
  </div>

  <div class="actions">
    <button class="btn" id="btn-clear" disabled>Clear Buffer</button>
    <button class="btn btn-gear" id="btn-gear">M</button>
  </div>

  <footer>
    <a href="#" id="welcome-link">Docs</a> // <a href="#" id="pricing-link">License</a> // v1.0.0
  </footer>

  <script src="src/popup.js"></script>
</body>
</html>
