<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#7c3aed" stroke-width="3"/>

  <!-- Eye outline / brow arc -->
  <path d="M 20 64 Q 64 20 108 64" fill="none" stroke="url(#eye)" stroke-width="5" stroke-linecap="round"/>
  <path d="M 20 64 Q 64 108 108 64" fill="none" stroke="url(#eye)" stroke-width="5" stroke-linecap="round"/>

  <!-- Iris -->
  <circle cx="64" cy="64" r="18" fill="url(#eye)" opacity="0.9"/>
  <!-- Pupil -->
  <circle cx="64" cy="64" r="9" fill="#0f0f1a"/>
  <!-- Highlight -->
  <circle cx="70" cy="58" r="3.5" fill="white" opacity="0.7"/>

  <!-- Pulse / signal waves -->
  <path d="M 18 88 L 30 88 L 36 76 L 44 100 L 52 82 L 58 88 L 72 88 L 78 78 L 86 96 L 92 88 L 110 88"
        fill="none" stroke="url(#pulse)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
