name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: 'Skip CI gate (emergency release only — requires justification in PR)'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write

jobs:
  ci-gate:
    name: Verify CI passed on release commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.inputs?.skip_ci_check === 'true') {
              core.warning('CI gate bypassed via skip_ci_check input — ensure tests passed manually');
              return;
            }
            const sha = context.sha;
            // Use the check runs API (not getCombinedStatusForRef) because GitHub
            // Actions reports results as check runs, not legacy commit statuses.
            const { data } = await github.rest.checks.listForRef({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              ref:      sha,
              per_page: 100,
            });
            const pending = data.check_runs.filter(r => r.status !== 'completed');
            const failed  = data.check_runs.filter(
              r => r.conclusion === 'failure' || r.conclusion === 'cancelled' || r.conclusion === 'timed_out'
            );
            if (pending.length > 0) {
              core.setFailed(`${pending.length} check(s) still running on ${sha} — wait for CI to complete`);
            } else if (failed.length > 0) {
              core.setFailed(`${failed.length} check(s) failed on ${sha}: ${failed.map(r => r.name).join(', ')}`);
            }

  build-binaries:
    name: Build Binaries
    needs: ci-gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            artifact: mergen-macos-arm64
          - os: macos-13 # Intel Mac
            target: macos-x64
            artifact: mergen-macos-x64
          - os: ubuntu-latest
            target: linux-x64
            artifact: mergen-linux-x64
          - os: windows-latest
            target: win-x64
            artifact: mergen-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build server
        working-directory: ./server
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'

      - name: Install pkg
        run: npm install -g pkg

      - name: Build binary
        working-directory: ./server
        run: pkg dist/index.js --targets node20-${{ matrix.target }} --output ../binaries/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: binaries/${{ matrix.artifact }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./binaries/${{ matrix.artifact }}
          asset_name: ${{ matrix.artifact }}
          asset_content_type: application/octet-stream

  publish-npm:
    name: Publish to NPM
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build
        working-directory: ./server
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'

      - name: Publish to NPM
        working-directory: ./server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build image for scanning (local, no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: mergen/server:scan-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mergen/server:scan-candidate
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build and push (scan passed)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            mergen/server:latest
            mergen/server:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
