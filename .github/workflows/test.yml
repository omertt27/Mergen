name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript — type check
        working-directory: server
        run: npx tsc --noEmit

      - name: Build
        working-directory: server
        run: npm run build:server

      # Uses vitest.config.ci.ts which excludes tests that require gitignored
      # closed-source modules. Those tests run locally via `npm test`.
      - name: Test
        working-directory: server
        run: npm run test:ci:coverage -- --reporter=verbose

      # Eval regression gate runs the detector accuracy suite as a dedicated
      # step so the report is always captured as an artifact, even if coverage
      # fails. The evals are also included in the Test step above; this step
      # only adds the tee for the artifact upload.
      - name: Eval Regression Gate
        working-directory: server
        run: npm run eval:regression -- --reporter=verbose 2>&1 | tee eval-report.txt

      - name: Upload eval report
        if: always() && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: eval-accuracy-report
          path: server/eval-report.txt

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: server/coverage/lcov.info
          flags: server
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm audit --audit-level=high
        working-directory: server
        continue-on-error: true