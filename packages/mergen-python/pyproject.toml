[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mergen-python"
version = "1.0.0"
description = "Mergen Python SDK — instruments Django/FastAPI/Flask and streams telemetry to your AI IDE via MCP"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
keywords = ["mergen", "mcp", "observability", "debugging", "ai", "telemetry"]
dependencies = []

[project.optional-dependencies]
django  = ["django>=3.2"]
fastapi = ["fastapi>=0.95", "httpx>=0.24"]
flask   = ["flask>=2.0"]
dev     = ["pytest>=7", "pytest-cov>=4"]

[tool.setuptools.packages.find]
where = ["."]
include = ["mergen*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

