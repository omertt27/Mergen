name = "mergen-corpus"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace — create with:
#   wrangler kv namespace create CALIBRATION_KV
#   wrangler kv namespace create CALIBRATION_KV --preview
[[kv_namespaces]]
binding = "CALIBRATION_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

[vars]
# Set via: wrangler secret put CORPUS_ADMIN_KEY
# Used for the GET /admin/stats endpoint only.
# Leave unset to disable the admin endpoint.

[limits]
cpu_ms = 50

[[routes]]
pattern = "corpus.mergen.dev/*"
zone_name = "mergen.dev"
